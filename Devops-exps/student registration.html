<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;


background:linear-gradient(
135deg,
#ff6b6b,
#ff9f43,
#feca57,
#48dbfb,
#5f27cd
);


background-size:400% 400%;
animation:move 12s infinite;
}


@keyframes move{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


.container{
width:100%;
max-width:850px;


background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);


padding:40px;


border-radius:25px;


box-shadow:0 20px 50px rgba(0,0,0,.25);
}


.header{
text-align:center;
margin-bottom:30px;
}


.header h1{
color:white;
font-size:2.5rem;
}


.header p{
color:#f3f3f3;
}


.section{
background:white;


padding:25px;


border-radius:20px;


margin-bottom:20px;
}


.section h2{
color:#5f27cd;


padding-left:10px;


border-left:6px solid #ff6b6b;


margin-bottom:20px;
}


.grid{
display:grid;


grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));


gap:15px;
}


.input-group{
display:flex;
flex-direction:column;
}


label{
font-weight:600;


margin-bottom:8px;
}


input,
select{
padding:12px;


border:2px solid #e6e6e6;


border-radius:12px;


font-size:15px;
}


input:focus,
select:focus{
outline:none;


border-color:#5f27cd;
}


.radio-group{
display:flex;


gap:20px;


flex-wrap:wrap;
}


.checkbox{
margin-top:15px;
}


.submit-btn{


width:100%;


padding:16px;


border:none;


border-radius:15px;


font-size:18px;


font-weight:600;


cursor:pointer;


color:white;


background:
linear-gradient(
90deg,
#ff6b6b,
#ff9f43,
#5f27cd
);


}


.submit-btn:hover{
transform:translateY(-3px);
}


</style>


</head>


<body>


<div class="container">


<div class="header">
<h1>📝 Registration Form</h1>
<p>Create your account below</p>
</div>


<form>


<div class="section">


<h2>👤 Personal Details</h2>


<div class="grid">


<div class="input-group">
<label>Full Name</label>
<input type="text" required>
</div>


<div class="input-group">
<label>Email</label>
<input type="email" required>
</div>


<div class="input-group">
<label>Phone Number</label>
<input type="tel">
</div>


<div class="input-group">
<label>Date of Birth</label>
<input type="date">
</div>


</div>


</div>


<div class="section">


<h2>🔐 Account Details</h2>


<div class="grid">


<div class="input-group">
<label>Username</label>
<input type="text" required>
</div>


<div class="input-group">
<label>Password</label>
<input type="password" required>
</div>


<div class="input-group">
<label>Confirm Password</label>
<input type="password" required>
</div>


<div class="input-group">
<label>Country</label>


<select>
<option>Select Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
</select>


</div>


</div>


</div>


<div class="section">


<h2>⚧ Gender</h2>


<div class="radio-group">


<label>
<input type="radio" name="gender">
Male
</label>


<label>
<input type="radio" name="gender">
Female
</label>


<label>
<input type="radio" name="gender">
Other
</label>


</div>


</div>


<div class="section">


<h2>📎 Upload Profile Photo</h2>


<input type="file">


<div class="checkbox">


<label>
<input type="checkbox" required>
I agree to Terms & Conditions
</label>


</div>

</div>


<button class="submit-btn">
🚀 Register
</button>


</form>


</div>


</body>
</html>
